<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Login - HealthSync Clinic</title>
</head>
<body>
    <div class="container">
        <img src="img1.jpg" alt="HealthSync Logo" style="height:80px; margin-bottom:10px">
        <h1>HealthSync Clinic</h1>
        <div class="card">
            <h3>Login</h3>
            <p style="font-size: 0.9rem; color: #666;">Try: <b>user@example.com</b> / <b>pass123</b></p>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="login()" style="width:100%; max-width:300px">Sign In</button>
            <div style="margin: 20px 0; color: #ccc;">OR</div>
            <button class="reg-btn">Create Account</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
