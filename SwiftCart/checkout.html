<!DOCTYPE html>
<html>
<head>
    <title>SwiftCart - Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="div1">
    <a href="index.html">Home</a>
    <a href="catalog.html">Catalog</a>
    <a href="cart.html">Cart</a>
    <a href="checkout.html">Checkout</a>
    <a href="status.html">Status</a>
    <a href="login.html">Login</a>
</div>

<div class="div7" id="checkoutItems"></div>

<div class="div8">
    <input type="text" placeholder="Full Name"><br>
    <input type="text" placeholder="Address"><br>
    <input type="text" placeholder="City"><br>
    <input type="text" placeholder="ZIP Code"><br>
    <p>Payment Method:</p>
    <input type="text" placeholder="Card Number"><br>
    <input type="text" placeholder="CVV"><br>
    <button type="button" onclick="submitOrder()">Submit Order</button>
</div>

<script>
let checkoutItemsDiv = document.getElementById("checkoutItems");

function renderCheckout(){
    checkoutItemsDiv.innerHTML="";
    let cart = JSON.parse(localStorage.getItem("cart")||"[]");
    cart.forEach((item)=>{
        let p = document.createElement("p");
        p.innerHTML=`<img src="${item.img}" width="50"> ${item.name}`;
        checkoutItemsDiv.appendChild(p);
    });
}

function submitOrder(){
    localStorage.removeItem("cart"); // Clear cart
    window.location.href="status.html";
}

renderCheckout();
</script>

</body>
</html>
