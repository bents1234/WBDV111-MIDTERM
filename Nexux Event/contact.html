<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Events | Contact</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="contact">
  <header class="header">
    <div class="container">
      <a class="logo" href="index.html">Nexus Events</a>
      <nav class="nav">
        <a href="index.html" data-nav="home">Home</a>
        <a href="events.html" data-nav="events">Events</a>
        <a href="tickets.html" data-nav="tickets">Tickets</a>
        <a href="venue.html" data-nav="venue">Venue</a>
        <a href="contact.html" data-nav="contact">Contact</a>
        <a href="admin-login.html" data-nav="admin">Admin</a>
      </nav>
      <button class="toggle" data-toggle>Matrix: OFF</button>
    </div>
  </header>

  <main class="container">
    <h1 class="section-header">Contact</h1>
    
    <div class="contact-grid">
      <form class="form">
        <h2>Transmit</h2>
        <div class="field">
          <input type="text" placeholder="Name">
        </div>
        <div class="field">
          <input type="email" placeholder="Email">
        </div>
        <div class="field">
          <select>
            <option>Tickets</option>
            <option>Groups</option>
            <option>Press</option>
          </select>
        </div>
        <div class="field">
          <textarea placeholder="Message..."></textarea>
        </div>
        <button class="btn primary">Send</button>
      </form>
      
      <div class="info-panel">
        <h2>Response Node</h2>
        <p>Replies within 24h</p>
        <div class="contacts">
          <span>nexus@events.io</span>
          <span>+1 (555) 202-TECH</span>
        </div>
        <a class="btn secondary" href="venue.html">Venue Guide</a>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <span class="badge">Nexus Events · Contact Node</span>
      <p>© <span data-year></span> Nexus Events. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/app.js" defer></script>
</body>
</html>
