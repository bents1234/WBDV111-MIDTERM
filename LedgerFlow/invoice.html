<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Ledger - Invoices</title>
</head>
<body>
    <nav>
        <a href="invoice.html">Invoices</a>
        <a href="clients.html">Clients</a>
        <a href="pay.html">Pay</a>
    </nav>
    <div class="card" style="margin-top: 60px;">
        <h1>LedgerFlow</h1>
        <input type="text" id="desc" placeholder="Description">
        <select id="type">
            <option value="Income">Income</option>
            <option value="Expense">Expense</option>
            <option value="Credit">Credit</option>
        </select>
        <input type="number" id="amt" placeholder="Amount">
        <button onclick="add()">Add</button>

        <div class="header-row">
            <div class="header-item">Description</div>
            <div class="header-item">Type</div>
            <div class="header-item">Amount</div>
        </div>
        <div id="list"></div>
        <div class="balance">Total Balance: ₱<span id="total">0</span></div>
    </div>
    <script>
        let bal = 0;
        function add() {
            const d = document.getElementById('desc').value;
            const t = document.getElementById('type').value;
            const a = document.getElementById('amt').value;
            if(!d || !a) return;
            const row = document.createElement('div');
            row.style.display = "flex";
            row.style.borderBottom = "1px solid #eee";
            row.innerHTML = `<div style="flex:1;padding:10px;">${d}</div><div style="flex:1;padding:10px;">${t}</div><div style="flex:1;padding:10px;">₱${a}</div>`;
            document.getElementById('list').appendChild(row);
            bal += parseFloat(a);
            document.getElementById('total').innerText = bal;
            document.getElementById('desc').value = "";
            document.getElementById('amt').value = "";
        }
    </script>
</body>
</html>
