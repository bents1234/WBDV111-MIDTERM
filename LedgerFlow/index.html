<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>LedgerFlow</title>
</head>
<body>
    <div class="card">
        <div style="font-size: 30px; margin-bottom: 10px;">🛡️</div>
        <h1>LedgerFlow Secure</h1>
        <p style="font-size: 12px; color: #666; margin-bottom: 20px;">Verification Required</p>
        <input type="text" id="user" placeholder="User ID">
        <input type="password" id="pass" placeholder="password">
        <button onclick="login()">Verify & Access</button>
        <p style="font-size: 11px; margin-top: 20px; color: #888;">Hint: user@try.com / pass123</p>
    </div>
    <script>
        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "user@try.com" && p === "pass123") {
                window.location.href = "invoice.html";
            } else {
                alert("Authorization Failed");
            }
        }
    </script>
</body>
</html>
