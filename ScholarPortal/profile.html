<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">ScholarPortal</div>
        <nav>
            <a href="courses.html">Courses</a>
            <a href="register.html">Register</a>
            <a href="profile.html">Profile</a>
        </nav>
    </header>

    <div class="container">
        <h2>Student Profile</h2>
        <p><strong>Name:</strong> <span id="studentName">Loading...</span></p>
        <p><strong>Student ID:</strong> 1001</p>
        
        <h3>Registered Courses</h3>
        <table>
            <tr>
                <th>Course Code</th>
                <th>Status</th>
            </tr>
            <tbody id="courseList">
            </tbody>
        </table>
    </div>

    <script>
        if (localStorage.getItem("user") == null) {
            window.location.href = "index.html";
        }

        document.getElementById("studentName").innerText = localStorage.getItem("user");

        var courses = localStorage.getItem("courses");
        var list = document.getElementById("courseList");

        if (courses == "" || courses == null) {
            list.innerHTML = "<tr><td colspan='2'>No courses registered</td></tr>";
        } else {
            var courseArray = courses.split(",");
            for (var i = 0; i < courseArray.length; i++) {
                var code = courseArray[i];
                list.innerHTML += "<tr><td>" + code + "</td><td>Active</td></tr>";
            }
        }
    </script>
