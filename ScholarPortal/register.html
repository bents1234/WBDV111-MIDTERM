<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">ScholarPortal</div>
        <nav>
            <a href="courses.html">Courses</a>
            <a href="register.html">Register</a>
            <a href="profile.html">Profile</a>
        </nav>
    </header>

    <div class="container">
        <h2>Course Registration</h2>
        <p>Select a course to add to your schedule.</p>
        <table>
            <tr>
                <th>Code</th>
                <th>Name</th>
                <th>Action</th>
            </tr>
            <tr>
                <td>WBDV111</td>
                <td>WEB DEVELOPMENT W/LAB</td>
                <td><button onclick="addCourse('WBDV111')">Register</button></td>
            </tr>
            <tr>
                <td>MATM111</td>
                <td>MATHEMATICS IN MODERN WORLD</td>
                <td><button onclick="addCourse('MATM111')">Register</button></td>
            </tr>
            <tr>
                <td>INPR111</td>
                <td>INTERMEDIATE PROGRAMMING</td>
                <td><button onclick="addCourse('INPR111')">Register</button></td>
            </tr>
        </table>
    </div>

    <script>
        if (localStorage.getItem("user") == null) {
            window.location.href = "index.html";
        }

        function addCourse(code) {
            var current = localStorage.getItem("courses");
            if (current == "") {
                localStorage.setItem("courses", code);
            } else {
                localStorage.setItem("courses", current + "," + code);
            }
            alert("Registered for " + code);
        }
    </script>
</body>
</html>
