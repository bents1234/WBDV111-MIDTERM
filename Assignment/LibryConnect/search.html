<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search - Libry Connect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Libry Connect</h1>
    <nav>
      <a class="nav-btn" href="index.html">Login</a>
    <a class="nav-btn" href="search.html">Search</a>
      <a class="nav-btn" href="members.html">Members</a>
	    <a class="nav-btn" href="books.html">Books</a>
      <a class="nav-btn" href="loans.html">Loans</a>
      <button class="info-btn" onclick="showOverdue()">Overdue</button>
    </nav>
  </header>

  <main>
    <section id="search">
      <h2>Search Library</h2>
      <input type="text" placeholder="Enter book title or author" class="search-input">
      <button onclick="performSearch()" class="card-btn">Search</button>
      <div id="searchResults"></div>
    </section>


    <div id="overdueDisplay" class="info-display"></div>
  </main>

  <script>
    function performSearch() {
      const query = document.querySelector('.search-input').value.toLowerCase();
      const results = [];
      const books = [
        "The Great Gatsby",
        "1984",
        "Moby Dick",
        "To Kill a Mockingbird",
        "Pride and Prejudice"
      ];
      books.forEach(book => {
        if(book.toLowerCase().includes(query)) results.push(book);
      });
      const searchResults = document.getElementById('searchResults');
      searchResults.innerHTML = results.length
        ? '<ul>' + results.map(b => `<li>${b}</li>`).join('') + '</ul>'
        : "<p>No books found.</p>";
    }

    function showOverdue() {
      const overdueItems = [
        `"Moby Dick" - Mark Johnson`,
        `"Hamlet" - Jane Smith`
      ];
      const display = document.getElementById('overdueDisplay');
      display.innerHTML = '<h3>Overdue Items:</h3><ul>' + overdueItems.map(item => `<li>${item}</li>`).join('') + '</ul>';
    }
  </script>
</body>
</html>
